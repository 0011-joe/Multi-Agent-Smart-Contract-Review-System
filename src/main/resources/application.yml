server:
  port: 8080

spring:
  application:
    name: contract-review-system

  profiles:
    active: dev

  # H2 Database (开发环境)
  datasource:
    url: jdbc:h2:mem:contract_review
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # Spring AI 配置
  ai:
    # Alibaba AI (智谱 GLM-4.5-air)
    alibaba:
      api-key: ${ZHIPU_API_KEY:your-zhipu-api-key}
      chat:
        options:
          model: glm-4.5-air
          temperature: 0.3

    # MCP Server 配置
    mcp:
      server:
        enabled: true
        name: contract-review-mcp-server
        version: 1.0.0
        type: SYNC

    # ChromaDB 向量存储
    chroma:
      client:
        host: ${CHROMADB_HOST:localhost}
        port: ${CHROMADB_PORT:8000}
      store:
        collection-name: contract_embeddings

# Nacos 服务注册
nacos:
  server-addr: ${NACOS_ADDR:127.0.0.1:8848}
  namespace: ${NACOS_NAMESPACE:public}

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Logging
logging:
  level:
    com.contract.review: DEBUG
    org.springframework.ai: INFO
    com.alibaba.cloud: INFO
